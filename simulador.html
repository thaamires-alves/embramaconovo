<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--navy:#003e6b;--orange:#e8732a}
  body{font-family:'Poppins',sans-serif;color:#1a1a1a;background:#fff;min-height:100vh}
  a{text-decoration:none;color:inherit}
  .sim-top{display:flex;align-items:center;gap:18px;padding:26px 60px 0}
  .sim-top .back{font-size:26px;color:#444;text-decoration:none}
  .sim-top .logo{width:190px;height:42px;background:var(--img-logo) left center/contain no-repeat;filter:none}
  .sim-wrap{max-width:1500px;margin:0 auto;padding:10px 60px 80px;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start}
  .sim-left h1{font-size:34px;font-weight:700;color:#1a1a1a;margin:20px 0 30px}
  .sim-left h1 b{color:var(--orange);font-weight:700}
  .drop{background:#f6f7f8;border:2px dashed #cdd6de;border-radius:14px;padding:48px;text-align:center;margin-bottom:24px}
  .drop .ic{width:60px;height:60px;margin:0 auto 16px;color:#9aa7b2}
  .drop .ic svg{width:100%;height:100%;fill:currentColor}
  .drop h3{font-size:18px;font-weight:600;color:#333;margin-bottom:6px}
  .drop p{font-size:14px;color:#7d8a95}
  .drop p a{color:var(--navy);text-decoration:underline}
  .drop .qr{width:140px;height:140px;margin:0 auto 16px;background:var(--img-qr) center/contain no-repeat}
  .sim-right h2{font-size:24px;font-weight:600;color:#1a1a1a;margin:64px 0 24px;line-height:1.3}
  .demos{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .demo{cursor:pointer}
  .demo .di{height:170px;border-radius:10px;background-size:cover;background-position:center;box-shadow:0 8px 20px rgba(0,0,0,.1);transition:.2s}
  .demo:hover .di{transform:translateY(-3px);box-shadow:0 12px 28px rgba(0,0,0,.16)}
  .demo span{display:block;text-align:center;margin-top:12px;font-size:15px;color:#444}
  @media(max-width:880px){.sim-wrap{grid-template-columns:1fr;gap:30px;padding:10px 24px 60px}.sim-right h2{margin-top:10px}.demos{grid-template-columns:1fr 1fr 1fr}}
</style>
</head>
